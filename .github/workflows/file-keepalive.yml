name: File Keepalive

on:
  schedule:
    # Run once per day at 2 AM UTC to start the continuous loop
    # Each run will automatically trigger the next one
    # This creates a continuous processing cycle
    - cron: '0 2 * * *'
  
  workflow_dispatch:  # Allow manual trigger from GitHub UI
    inputs:
      dry_run:
        description: 'Dry run mode (test without downloading files)'
        required: false
        type: boolean
        default: false
      reset_state:
        description: 'Reset state and start fresh (clear all progress)'
        required: false
        type: boolean
        default: false
      continuous_loop:
        description: 'Enable continuous loop (restart after completion)'
        required: false
        type: boolean
        default: true

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2 hours max (conservative limit)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Restore state from cache
        if: ${{ github.event.inputs.reset_state != 'true' }}
        uses: actions/cache/restore@v4
        with:
          path: keepalive-state.json
          key: keepalive-state-${{ github.run_id }}
          restore-keys: |
            keepalive-state-
      
      - name: Reset state if requested
        if: ${{ github.event.inputs.reset_state == 'true' }}
        run: |
          echo "Resetting state..."
          rm -f keepalive-state.json
          echo "State reset complete"
      
      - name: Run keepalive check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "Starting file keepalive service..."
          echo "Dry run: ${{ github.event.inputs.dry_run || 'false' }}"
          echo "Processing ALL files (no date limit)"
          
          # Build flags based on inputs
          # No max-age-days limit - process ALL files
          # State tracking ensures we resume from where we stopped
          FLAGS="--once --delay-seconds=300"  # 5 min delay
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          
          # Run the keepalive service
          # State file tracks progress - will resume from last processed file
          go run . $FLAGS || echo "Run completed or interrupted"
      
      - name: Save state to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: keepalive-state.json
          key: keepalive-state-${{ github.run_id }}
      
      - name: Upload state file as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keepalive-state-${{ github.run_id }}
          path: keepalive-state.json
          retention-days: 7
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: keepalive-logs-${{ github.run_id }}
          path: |
            *.log
          retention-days: 7
      
      - name: Check if all files processed and reset for next cycle
        id: check_completion
        if: always()
        run: |
          if [ -f keepalive-state.json ]; then
            # Check state file to see if we've processed files
            FILES_COMPLETED=$(grep -o '"files_completed":[0-9]*' keepalive-state.json | grep -o '[0-9]*' || echo "0")
            echo "Files completed in this run: $FILES_COMPLETED"
            
            if [ "$FILES_COMPLETED" -gt 0 ]; then
              echo "Files were processed. Will continue in next run."
              echo "needs_rerun=true" >> $GITHUB_OUTPUT
            else
              echo "No files processed. May be complete or error occurred."
              echo "needs_rerun=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "No state file. Will start fresh in next run."
            echo "needs_rerun=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Trigger next run for continuous loop
        if: steps.check_completion.outputs.needs_rerun == 'true' && (github.event_name == 'schedule' || github.event.inputs.continuous_loop == 'true')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log('Triggering next workflow run for continuous processing...');
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'file-keepalive.yml',
                ref: context.ref
              });
              console.log('Next run triggered successfully - continuous loop active');
            } catch (error) {
              console.log('Failed to trigger next run:', error.message);
              console.log('Will retry on next scheduled run');
            }
